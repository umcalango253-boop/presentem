<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa do Presente</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            background: #ff007f;
            font-family: 'Arial Black', sans-serif;
            scroll-behavior: smooth;
        }

        #tela-inicial {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: #ff007f;
        }

        .btn-principal {
            padding: 30px 60px;
            font-size: 28px;
            cursor: pointer;
            background-color: white;
            color: black;
            border: 6px solid black;
            border-radius: 20px;
            box-shadow: 12px 12px 0px black;
            transition: 0.2s;
        }

        #tela-mapa {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            min-height: 700vh; /* Espaço total para a jornada */
            padding-bottom: 500px;
        }

        .titulo-mapa {
            font-size: 45px;
            color: black;
            margin-top: 50px;
            text-transform: uppercase;
        }

        .mapa-caminho {
            position: relative;
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
        }

        .circulo {
            width: 120px;
            height: 120px;
            border: 6px solid black;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            color: black;
            cursor: pointer;
            z-index: 10;
            margin: 300px 0; /* Espaçamento bem grande para não amontoar */
            background: transparent;
            transition: 0.3s;
            position: relative;
        }

        .circulo:hover { background-color: white; }

        /* Classes de posição */
        .esquerda { align-self: flex-start; margin-left: 10%; }
        .meio     { align-self: center; }
        .direita  { align-self: flex-end; margin-right: 10%; }

        /* Estilo das Curvas e Textos */
        .container-revelado {
            display: none;
            position: absolute;
            z-index: 5;
        }

        .linha-curva {
            fill: none;
            stroke: black;
            stroke-width: 5;
            stroke-dasharray: 12;
            stroke-linecap: round;
        }

        .texto-secreto {
            position: absolute;
            font-size: 18px;
            color: white;
            background: black;
            padding: 15px;
            border-radius: 15px;
            white-space: nowrap;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.3);
        }

        /* Posicionamento manual de cada pista */
        #pista-1 { top: 120px; left: 20px; }
        #pista-1 .texto-secreto { top: 150px; left: 80px; }

        #pista-2 { top: 120px; left: -180px; }
        #pista-2 .texto-secreto { top: 150px; left: -120px; }

        #pista-3 { top: 120px; left: -250px; }
        #pista-3 .texto-secreto { top: 150px; left: -180px; }

        #pista-4 { top: 120px; left: 50px; }
        #pista-4 .texto-secreto { top: 150px; left: 40px; }

        #pista-5 { top: 120px; left: 80px; }
        #pista-5 .texto-secreto { top: 150px; left: 10px; }

    </style>
</head>
<body>

    <div id="tela-inicial">
        <button class="btn-principal" onclick="mostrarMapa()">Mapa do Presente!</button>
    </div>

    <div id="tela-mapa">
        <div class="titulo-mapa">Mapa do Presente</div>
        
        <div class="mapa-caminho">
            
            <!-- PISTA 1 -->
            <div class="circulo esquerda" onclick="revelar('pista-1')">
                1
                <div id="pista-1" class="container-revelado">
                    <svg width="250" height="200"><path class="linha-curva" d="M 50,0 C 50,100 180,50 180,150" /></svg>
                    <div class="texto-secreto">Atrás de alguma cortina...</div>
                </div>
            </div>

            <!-- PISTA 2 -->
            <div class="circulo meio" onclick="revelar('pista-2')">
                2
                <div id="pista-2" class="container-revelado">
                    <svg width="300" height="200"><path class="linha-curva" d="M 150,0 C 150,100 20,50 20,150" /></svg>
                    <div class="texto-secreto">Em algum lugar que faz comida...</div>
                </div>
            </div>
            
            <!-- PISTA 3 -->
            <div class="circulo direita" onclick="revelar('pista-3')">
                3
                <div id="pista-3" class="container-revelado">
                    <svg width="350" height="200"><path class="linha-curva" d="M 250,0 C 250,120 50,20 50,150" /></svg>
                    <div class="texto-secreto">Onde entramos em um mundo imáginario...</div>
                </div>
            </div>

            <!-- PISTA 4 -->
            <div class="circulo meio" onclick="revelar('pista-4')">
                4
                <div id="pista-4" class="container-revelado">
                    <svg width="250" height="200"><path class="linha-curva" d="M 100,0 C 100,80 200,80 200,150" /></svg>
                    <div class="texto-secreto">Frutas e vegetais ganham vida!</div>
                </div>
            </div>

            <!-- PISTA 5 (FINAL) -->
            <div class="circulo esquerda" onclick="revelar('pista-5')">
                5
                <div id="pista-5" class="container-revelado">
                    <svg width="250" height="200"><path class="linha-curva" d="M 50,0 C 50,50 150,100 100,150" /></svg>
                    <div class="texto-secreto">Onde tecidos são guardados...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function mostrarMapa() {
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('tela-mapa').style.display = 'flex';
            window.scrollTo(0, 0);
        }

        function revelar(id) {
            const segredo = document.getElementById(id);
            const isVisible = segredo.style.display === 'block';
            
            // Fecha todas as outras pistas para manter limpo (opcional)
            document.querySelectorAll('.container-revelado').forEach(el => el.style.display = 'none');
            
            // Abre a clicada
            segredo.style.display = isVisible ? 'none' : 'block';
        }
    </script>

</body>
</html>
